<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Gallery</title>
    <link rel="stylesheet" href="FloraGallery.css">
</head>
<body>
    <header class="gallery-header">
        <div class="left-header">
            <a href="Homepage.html" class="home-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9.5L12 3l9 6.5v10.5a1 1 0 0 1-1 1h-5v-6h-4v6H4a1 1 0 0 1-1-1v-10.5z"></path>
                </svg>
            </a>
            <a href="Homepage.html" class="Logo">THE GALLERY</a>
        </div>
        <h2 class="gallery-title">FLORA</h2>
    </header>

    <main class="gallery-container">
        <div class="featured-column">
            <div class="gallery-card large-card">
                <div class="img-wrapper">
                    <img src="flora1.jpg" alt="Tall Trees in Lush Forest">
                </div>
                <div class="hover-caption">
                    <h3>Tall Trees in Lush Forest</h3>
                    <a href="Photo by Jack Davis: https://www.pexels.com/photo/low-angle-shot-of-tall-trees-8949022/" class="photo-link">Photo by Jack Davis</a>
                </div>
            </div>
        </div>  

        <div class="grid-column">
            <div class="thumb-grid">
                <div class="gallery-card small-card">
                    <div class="img-wrapper">
                        <img src="flora2.jpg" alt="Assorted Greenery">
                    </div>
                    <div class="hover-caption">
                        <h3>Vibrant Assorted</h3>
                        <a href="https://www.pexels.com/photo/assorted-green-plants-667263/" class="photo-link">Photo by Anelia</a>
                    </div>
                </div>
                <div class="gallery-card small-card">
                    <div class="img-wrapper">
                        <img src="flora4.jpg" alt="Autumn Ivy">
                    </div>
                    <div class="hover-caption">
                        <h3>Autumn Ivy</h3>
                        <a href="Photo by Sergey Guk: https://www.pexels.com/photo/colorful-autumn-ivy-on-historical-building-in-wroclaw-37635098/" class="photo-link">Photo by Sergey Guk</a>
                    </div>
                </div>
                <div class="gallery-card small-card">
                    <div class="img-wrapper">
                        <img src="flora3.jpg" alt="Blue Sky and Grass">
                    </div>
                    <div class="hover-caption">
                        <h3>Blue Sky and Grass</h3>
                        <a href="Photo by Ruma Sinha: https://www.pexels.com/photo/blue-sky-and-grass-37635098/" class="photo-link">Photo by Ruma Sinha</a>
                    </div>
                </div>
                <div class="gallery-card small-card">
                    <div class="img-wrapper">
                        <img src="flora5.jpg" alt="Colorful Tulips">
                    </div>
                    <div class="hover-caption">
                        <h3>Colorful Tulips</h3>
                        <a href="https://www.pexels.com/photo/colorful-tulips-in-front-of-snowy-alpine-mountains-37021711/" class="photo-link">Photo by 0xd1ma</a>
                    </div>
                </div>
            </div>
            
           
        </div>
        
    </main>

     <div class="nav-buttons">
                <a href="Homepage.html" class="nav-btn">Home</a>
                <a href="FaunaGallery.html" class="nav-btn">Next Exhibit</a>
            </div>

    <footer class="footer">
        <p>&copy; 2026 The Gallery. All rights reserved.</p>
    </footer>
</body>
</html>
